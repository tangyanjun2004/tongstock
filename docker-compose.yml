version: '3.8'
services:
  tongstock-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tongstock-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - tongstock-data:/app/data
      - ./configs:/app/configs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tongstock-network

volumes:
  tongstock-data:
    driver: local

networks:
  tongstock-network:
    driver: bridge
